<style>
  body { background:#f8fafc; margin:0; padding:20px; font-family:'Roboto', sans-serif; color:#0f172a; }
  .chart-wrap { background:#ffffff; border:1px solid #dbe7ee; border-radius:14px; padding:18px 20px 16px; }

  .legend { display:flex; gap:14px; margin:6px 0 12px; }
  .legend-item { font-size:12px; color:#334155; display:flex; align-items:center; gap:6px; }
  .sw { width:14px; height:14px; border-radius:5px; display:inline-block; }
  .metric-label { font-size:12px; fill:#334155; font-weight:500; }
  .val-label { font-size:11px; fill:#0f172a; font-weight:500; }
  .grid-line { stroke:#edf3f7; stroke-width:1; }
