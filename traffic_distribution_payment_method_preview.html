
<!DOCTYPE html>
<html>
<head>
<meta charset='utf-8'>
<link rel='stylesheet' href='https://fonts.googleapis.com/css2?family=Open+Sans:wght@400;700&family=Roboto:wght@400;500;700&display=swap'>
<script src='https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js'></script>
<style>
  body { background:#FFFFFF; margin:0; padding:18px; font-family:'Roboto', sans-serif; color:#011627; }
  .tdp-wrap { background:#FFFFFF; border:2px solid #D0D7DA; border-radius:14px; padding:14px; }
  .tdp-title { font-family:'Open Sans', sans-serif; font-size:34px; font-weight:700; line-height:1.1; margin:0 0 4px; }
  .tdp-subtitle { font-size:14px; color:#595959; margin:0 0 10px; }
  .tdp-kpi-row { display:grid; grid-template-columns:repeat(3,minmax(0,1fr)); gap:10px; margin-bottom:12px; }
  .tdp-kpi { border:1px solid #D3D3D3; border-radius:10px; overflow:hidden; background:#FFFFFF; }
  .tdp-kpi-h { background:#EBFCFF; text-align:center; font-size:13px; font-weight:700; padding:5px 6px; }
  .tdp-kpi-v { text-align:center; color:#31CAE8; font-size:34px; font-weight:700; padding:6px 6px 8px; line-height:1; }
  .tdp-panel { background:#FFFFFF; border:1px solid #D0D7DA; border-radius:12px; padding:8px; overflow:hidden; }
  .tdp-y-label { font-size:12px; fill:#011627; font-weight:500; font-family:'Roboto', sans-serif; }
  .tdp-v-label { font-size:12px; fill:#011627; font-weight:700; font-family:'Roboto', sans-serif; }
  .tdp-tick-line { stroke:#C0C0C0; stroke-width:1; }
  .tdp-tick-label { font-size:11px; fill:#595959; font-family:'Roboto', sans-serif; }
  .tdp-pfw { max-width: 1100px; margin: 0 auto; }
  .tdp-save-bottom { display:flex; align-items:center; justify-content:flex-end; gap:10px; margin-top:12px; }
  .tdp-save-btn { background:#31CAE8; color:#fff; border:none; border-radius:8px; padding:7px 12px; font-size:12px; font-weight:600; cursor:pointer; }
  .tdp-save-status { font-size:11px; color:#595959; }
</style>
</head>
<body>
  <div class='tdp-pfw'>
  <div class='tdp-wrap'>
    <div class='tdp-title'>Traffic Distribution by Payment Method</div>
    <div class='tdp-kpi-row'>
      <div class='tdp-kpi'><div class='tdp-kpi-h'>All payment methods in sample</div><div class='tdp-kpi-v'>33</div></div>
      <div class='tdp-kpi'><div class='tdp-kpi-h'>Total successful invoices</div><div class='tdp-kpi-v'>264,582</div></div>
      <div class='tdp-kpi'><div class='tdp-kpi-h'>Top-5 traffic share</div><div class='tdp-kpi-v'>98.87%</div></div>
    </div>
    <div class='tdp-panel'>
      <svg width='100%' viewBox='0 0 980 248' preserveAspectRatio='xMinYMin meet' role='img' aria-label='Traffic distribution by payment method'>
        <line x1='280.00' y1='16' x2='280.00' y2='212' class='tdp-tick-line' /><text x='280.00' y='236' text-anchor='middle' class='tdp-tick-label'>0</text><line x1='408.00' y1='16' x2='408.00' y2='212' class='tdp-tick-line' /><text x='408.00' y='236' text-anchor='middle' class='tdp-tick-label'>18,419</text><line x1='536.00' y1='16' x2='536.00' y2='212' class='tdp-tick-line' /><text x='536.00' y='236' text-anchor='middle' class='tdp-tick-label'>36,839</text><line x1='664.00' y1='16' x2='664.00' y2='212' class='tdp-tick-line' /><text x='664.00' y='236' text-anchor='middle' class='tdp-tick-label'>55,258</text><line x1='792.00' y1='16' x2='792.00' y2='212' class='tdp-tick-line' /><text x='792.00' y='236' text-anchor='middle' class='tdp-tick-label'>73,678</text><line x1='920.00' y1='16' x2='920.00' y2='212' class='tdp-tick-line' /><text x='920.00' y='236' text-anchor='middle' class='tdp-tick-label'>92,098</text>
        <text x='266' y='56' text-anchor='end' class='tdp-y-label'>Bank cards</text><rect x='280' y='40' width='640' height='20' rx='9' ry='9' fill='#EBFCFF' /><rect x='280' y='40' width='640.00' height='20' rx='9' ry='9' fill='#31CAE8' /><text x='928.00' y='56' class='tdp-v-label'>92,098</text><text x='266' y='92' text-anchor='end' class='tdp-y-label'>Apple Pay</text><rect x='280' y='76' width='640' height='20' rx='9' ry='9' fill='#EBFCFF' /><rect x='280' y='76' width='626.43' height='20' rx='9' ry='9' fill='#31CAE8' /><text x='914.43' y='92' class='tdp-v-label'>90,145</text><text x='266' y='128' text-anchor='end' class='tdp-y-label'>PayPal</text><rect x='280' y='112' width='640' height='20' rx='9' ry='9' fill='#EBFCFF' /><rect x='280' y='112' width='218.81' height='20' rx='9' ry='9' fill='#31CAE8' /><text x='506.81' y='128' class='tdp-v-label'>31,487</text><text x='266' y='164' text-anchor='end' class='tdp-y-label'>Google Pay</text><rect x='280' y='148' width='640' height='20' rx='9' ry='9' fill='#EBFCFF' /><rect x='280' y='148' width='212.52' height='20' rx='9' ry='9' fill='#31CAE8' /><text x='500.52' y='164' class='tdp-v-label'>30,583</text><text x='266' y='200' text-anchor='end' class='tdp-y-label'>Cash App</text><rect x='280' y='184' width='640' height='20' rx='9' ry='9' fill='#EBFCFF' /><rect x='280' y='184' width='120.00' height='20' rx='9' ry='9' fill='#31CAE8' /><text x='408.00' y='200' class='tdp-v-label'>17,269</text>
      </svg>
    </div>
  </div>
  <div class='tdp-save-bottom'><button id='tdp-save-svg' class='tdp-save-btn'>Save as SVG</button><span id='tdp-save-status' class='tdp-save-status'></span></div>
</div>
<script>
// Save full widget as SVG (raster snapshot in SVG) - same pattern as YoY Comparison
const tdpSaveBtn = document.getElementById('tdp-save-svg');
const tdpSaveStatus = document.getElementById('tdp-save-status');
if (tdpSaveBtn) {
  tdpSaveBtn.addEventListener('click', async () => {
    try {
      const root = document.querySelector('.tdp-pfw');
      if (!root) throw new Error('Widget root not found');
      if (typeof html2canvas === 'undefined') throw new Error('html2canvas is not loaded');

      const saveBlock = root.querySelector('.tdp-save-bottom');
      const prevDisplay = saveBlock ? saveBlock.style.display : '';
      if (saveBlock) saveBlock.style.display = 'none';
      const canvas = await html2canvas(root, {
        backgroundColor: '#ffffff',
        useCORS: true,
        scale: 2,
      });
      if (saveBlock) saveBlock.style.display = prevDisplay;

      const pngDataUrl = canvas.toDataURL('image/png');
      const width = canvas.width;
      const height = canvas.height;
      const svgString = `<?xml version="1.0" encoding="UTF-8"?>`
        + `\n<svg xmlns="http://www.w3.org/2000/svg" width="${width}" height="${height}" viewBox="0 0 ${width} ${height}">`
        + `<rect x="0" y="0" width="${width}" height="${height}" fill="white"/>`
        + `<image href="${pngDataUrl}" x="0" y="0" width="${width}" height="${height}"/>`
        + `</svg>`;

      const resp = await fetch('/__save_svg', {
        method: 'POST',
        headers: {'Content-Type': 'image/svg+xml; charset=utf-8'},
        body: svgString,
      });
      if (!resp.ok) throw new Error('Save failed');
      const msg = await resp.text();
      tdpSaveStatus.textContent = msg || 'Saved';
      tdpSaveStatus.style.color = '#2E7D32';
    } catch (e) {
      tdpSaveStatus.textContent = 'Save failed';
      tdpSaveStatus.style.color = '#C62828';
    }
  });
}
</script>

</body>
</html>
